function slotRaw(key){
  try{
    let raw=localStorage.getItem(key);
    if(!raw&&key===SAVE_SLOTS[0])raw=localStorage.getItem(LEGACY_SAVE_KEY); // 旧セーブはスロット1として読む

  }catch(e){return null;}
}
function slotLabel(key,i){
  const raw=slotRaw(key);

}

function mkMember(cls,lv){
  const c=CLASSES[cls];
  let hp=c.hp,mp=c.mp,atk=c.atk,def=c.def,agi=c.agi||5;
  for(let l=2;l<=lv;l++){hp+=c.g.hp;mp+=c.g.mp;atk+=c.g.atk;def+=c.g.def;if(l%2===0)agi+=(c.g.agi||1);}
  return {cls,name:c.name,lv,hp,maxhp:hp,mp,maxmp:mp,batk:atk,bdef:def,agi,status:{poison:false,sleep:0},exp:0,weapon:null,armor:null};
}
function mAtk(m){return m.batk+(m.weapon?m.weapon.v:0);}
function mDef(m){return m.bdef+(m.armor?m.armor.v:0);}

const LV_CAP=20;
function expNext(m){return m.lv>=LV_CAP?Infinity:m.lv*m.lv*6;}
function knownSpells(m){return CLASSES[m.cls].learns.filter(l=>m.lv>=l.lv).map(l=>Object.assign({key:l.key},SPELL_DEFS[l.key]));}
function aliveMembers(){return party.filter(m=>m.hp>0);}

// ---------------- セーブ／ロード ----------------
function storageOK(){
  try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return true;}catch(e){return false;}
}
function saveGame(saveKeyArg){
  if(!storageOK())return false;
  try{
    localStorage.setItem(saveKeyArg||SAVE_SLOTS[0],JSON.stringify({
      v:3,party,gold:P.gold,herbs:P.herbs,waters:P.waters,bag:P.equipBag,visited:G.visited,tactic:G.tactic,dex:G.dex,map:P.map,x:P.x,y:P.y,dir:P.dir,
      joined:G.joined,gotTreasure:G.gotTreasure,cleared:G.cleared,flags:G.flags}));
    return true;
  }catch(e){return false;}
}
function hasSave(){
  if(!storageOK())return false;
  return SAVE_SLOTS.some(k=>!!slotRaw(k));
}
function loadGame(loadKeyArg){
  try{
    let raw=null;
    if(loadKeyArg)raw=slotRaw(loadKeyArg);
    else{for(const k of SAVE_SLOTS){raw=slotRaw(k);if(raw)break;}}
    const d=JSON.parse(raw);
    if(!d||d.v!==3||!d.party)return false;
    party=d.party;
    P.gold=d.gold;P.herbs=d.herbs;P.waters=d.waters||0;P.equipBag=d.bag||[];G.visited=d.visited||{alba:true};G.tactic=d.tactic||'manual';G.dex=d.dex||{};P.map=d.map;P.x=d.x;P.y=d.y;P.dir=d.dir||0;
    party.forEach(m=>{
      if(m.agi==null){const c=CLASSES[m.cls];m.agi=(c.agi||5)+Math.floor(m.lv/2)*(c.g.agi||1);}
      m.status={poison:false,sleep:0};
    });
    G.joined=d.joined||{};G.gotTreasure=d.gotTreasure||{};G.cleared=!!d.cleared;G.flags=Object.assign(G.flags,d.flags||{});
    G.trail=[];
    return true;
  }catch(e){return false;}
}

    if(this.cur===name)return;

    this.timer=setInterval(()=>this.tick(),60000/th.bpm/2);
  },
  stop(){this.cur=null;clearInterval(this.timer);},
  tick(){
    if(!this.enabled||!AU.ctx||!this.cur)return;
    const th=this.THEMES[this.cur];
    const i=this.step%th.mel.length;
    const m=this.N[th.mel[i]],b=this.N[th.bass[i]];
    if(m)AU.tone(m,0.14,th.melType,0.035);
    if(b)AU.tone(b,0.2,'triangle',0.045);
    this.step++;
  },
};
function updateBGM(){
  if(G.mode==='title')return;
  if(G.battle){BGM.play(G.battle.named?'boss':'battle');return;}
  const towns={alba:1,village:1,river:1,nord:1};
  if(towns[P.map])BGM.play('town');
  else if(P.map==='cave'||P.map==='tower'||P.map==='castle'||P.map==='castle2'||P.map==='castle3'||P.map==='depths')BGM.play('dungeon');
  else if(P.map==='villageB'||P.map==='grave'||P.map==='shrine')BGM.play('sorrow');
  else BGM.play('field');
}

  init(){if(!this.ctx){try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}},
  tone(f,dur,type,vol,when){if(!this.ctx)return;const t=(when||0)+this.ctx.currentTime;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type||'square';o.frequency.value=f;
    g.gain.setValueAtTime(vol||0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g);g.connect(this.ctx.destination);o.start(t);o.stop(t+dur+0.02);},

function nextMsg(){
  if(G.msgQ.length===0){msgWin.style.display='none';msgArrow.style.display='none';
    const cb=G.msgCb;G.msgCb=null;if(cb)cb();return;}
  const line=G.msgQ.shift();curFull=line;
  msgText.textContent='';msgArrow.style.display='none';G.typing=true;
  let i=0;
  G.typeTimer=setInterval(()=>{
    msgText.textContent=line.slice(0,++i);
    if(i>=line.length){clearInterval(G.typeTimer);G.typing=false;msgArrow.style.display='inline';}
  },16);
}
function advanceMsg(){
  if(G.typing){clearInterval(G.typeTimer);G.typing=false;
    msgText.textContent=curFull;msgArrow.style.display='inline';return;}
  nextMsg();
}

// ---------------- 描画 ----------------
function drawArt(artDef,px,py,scale,flip,frame){
  const s=scale||2;const rows=artDef.art;
  const legRow=rows.length-3; // 足元3行は歩行フレームで互い違いに
  rows.forEach((row,y)=>{
    const legShift=(frame&&y>=legRow)?((frame+y)%2===0?1:-1):0;
    for(let x=0;x<row.length;x++){
      const c=row[x];if(c==='.'||c===' ')continue;
      const dx=flip?(row.length-1-x):x;
      ctx.fillStyle=artDef.pal[+c-1]||'#fff';
      ctx.fillRect(px+dx*s+legShift,py+y*s,s,s);}
  });
}
function drawTile(ch,px,py,x,y){

      ctx.fillStyle='#3aa54c';if((x*7+y*13)%5===0){ctx.fillRect(px+5,py+6,2,2);ctx.fillRect(px+15,py+14,2,2);}break;}
    case 'f':{ctx.fillStyle='#2f8f3f';ctx.fillRect(px,py,TS,TS);
      ctx.fillStyle='#1a5f2a';ctx.beginPath();ctx.moveTo(px+12,py+3);ctx.lineTo(px+21,py+18);ctx.lineTo(px+3,py+18);ctx.closePath();ctx.fill();
      ctx.fillStyle='#6a4020';ctx.fillRect(px+10,py+18,4,4);break;}
    case 'M':{ctx.fillStyle='#7a6a52';ctx.fillRect(px,py,TS,TS);

      ctx.fillStyle='#e8e8e8';ctx.beginPath();ctx.moveTo(px+12,py+2);ctx.lineTo(px+15,py+8);ctx.lineTo(px+9,py+8);ctx.closePath();ctx.fill();break;}
    case '~':{ctx.fillStyle='#2050a0';ctx.fillRect(px,py,TS,TS);
      ctx.strokeStyle='#4a80d0';ctx.beginPath();const o=((x+y)%2)*4;
      ctx.moveTo(px+3,py+8+o);ctx.quadraticCurveTo(px+7,py+5+o,px+11,py+8+o);ctx.quadraticCurveTo(px+15,py+11+o,px+19,py+8+o);ctx.stroke();break;}
    case 'r': case 'D':{ctx.fillStyle='#c8a86a';ctx.fillRect(px,py,TS,TS);
      ctx.fillStyle='#b89858';ctx.fillRect(px+2,py+2,3,3);ctx.fillRect(px+16,py+14,3,3);break;}

      ctx.fillStyle='#c04030';ctx.fillRect(px+3,py+9,18,12);
      ctx.fillStyle='#802818';ctx.beginPath();ctx.moveTo(px+12,py+2);ctx.lineTo(px+23,py+10);ctx.lineTo(px+1,py+10);ctx.closePath();ctx.fill();

  ctx.fillStyle='#f0c8a0';ctx.fillRect(px+8,py+4,8,7);

}
function drawBossIdle(px,py){
  ctx.fillStyle='#b03040';ctx.fillRect(px+5,py+6,14,14);
  ctx.fillStyle='#501020';ctx.fillRect(px+3,py+2,4,6);ctx.fillRect(px+17,py+2,4,6);
  ctx.fillStyle='#ffd54a';ctx.fillRect(px+9,py+10,2,2);ctx.fillRect(px+14,py+10,2,2);

function render(){
  const m=MAPS[P.map];
  const rows=m.tiles;const mw=rows[0].length,mh=rows.length;
  let camX=Math.max(0,Math.min(mw-VW,P.x-Math.floor(VW/2)));
  let camY=Math.max(0,Math.min(mh-VH,P.y-Math.floor(VH/2)));
  if(mw<=VW)camX=Math.floor((mw-VW)/2);
  if(mh<=VH)camY=Math.floor((mh-VH)/2);
  ctx.fillStyle='#000';ctx.fillRect(0,0,cv.width,cv.height);
  for(let sy=0;sy<VH;sy++)for(let sx=0;sx<VW;sx++){
    const x=camX+sx,y=camY+sy;
    if(x<0||y<0||x>=mw||y>=mh)continue;
    drawTile(rows[y][x],sx*TS,sy*TS,x,y);
  }
  // 隊列：先頭=勇者、後ろに加入順で並ぶ（軌跡を辿る）
  for(let i=party.length-1;i>=1;i--){
    const t=G.trail[i-1];
    if(t&&t.map===P.map){drawArt(CHAR_ARTS[party[i].cls],(t.x-camX)*TS,(t.y-camY)*TS-((G.steps+i)%2),2,P.dir===1,(G.steps+i)%2+1);}
  }
  drawArt(CHAR_ARTS.hero,(P.x-camX)*TS,(P.y-camY)*TS-(G.steps%2),2,P.dir===1,G.steps%2+1);
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(4,4,150,18);
  ctx.fillStyle='#fff';ctx.font='11px monospace';
  ctx.fillText(m.name+'  Lv'+party[0].lv+'  '+party.length+'にん',10,17);
}

// ---------------- 移動 ----------------
function tileAt(map,x,y){const rows=MAPS[map].tiles;if(y<0||y>=rows.length||x<0||x>=rows[0].length)return '#';return rows[y][x];}
function isBlocked(ch){
  if(SOLID.has(ch))return true;
  if('KPISBnXYQ'.includes(ch))return true;
  if(ch==='s')return G.flags.spider;
  if(ch==='C'&&!G.flags.crystal)return true; // 結界：やみのすいしょうが必要
  if(ch==='W')return !G.flags.castleSwitch; // 城内の結界：そうちで解除
  if(ch==='L')return !G.flags.castleDragon; // こくりゅう：たおすと通れる
  if(ch==='j')return true; // とらわれの へいし
  if(ch==='x')return true; // 瓦礫
  if(ch==='k')return G.flags.raid&&!G.flags.raidCleared; // ダルガ：撃退後は消える
  if('qbvw'.includes(ch))return true; // 墓・手記・ひかるもの
  if(ch==='u')return true; // 破れたページ
  if(ch==='O')return true; // かがり火
  if(ch==='i')return !G.flags.shrineOpen; // 隠し階段：封印中は入れない
  if(ch==='J')return true; // そうち（隣から調べる）
  if(RECRUIT_TILES[ch]&&!G.joined[RECRUIT_TILES[ch]])return true;
  return false;
}
function tryMove(dx,dy){
  if(G.mode!=='field')return;
  P.dir=dy>0?0:dy<0?3:dx<0?1:2;
  const nx=P.x+dx,ny=P.y+dy;
  const ch=tileAt(P.map,nx,ny);
  if(isBlocked(ch)){render();return;}
  // 隊列の軌跡を更新（移動前の位置を先頭に積む）
  if(P.map==='river'&&G.flags.page1&&G.flags.page2&&G.flags.page3&&!G.flags.shrineOpen&&'yzg'.includes(ch)){
    {
      const ch3=ch; // 移動先の紋章
      G._seq=G._seq||[];
      if(G._seq.length&&ch3===G._seq[G._seq.length-1]){/* 同じ紋章の踏み直しは無視 */}
      else{
      const need=['y','z','g'][G._seq.length];
      if(ch3===need){
        G._seq.push(ch3);AU.blip();
        if(G._seq.length===3){
          G.flags.shrineOpen=true;render();
          showMsg(['ゴゴゴ……ゆかの いしが うごき、','かくし かいだんが あらわれた！'],null);
          G.mode='msg';
        }
      }else{
        G._seq=[];AU.hit();
        showMsg(['ゆかの もんしょうが つめたく ひかった。','（じゅんばんが ちがう ようだ）'],null);
        G.mode='msg';
      }
      }
    }
  }
  G.trail.unshift({map:P.map,x:P.x,y:P.y});
  if(G.trail.length>4)G.trail.length=4;
  P.x=nx;P.y=ny;G.steps++;
  const m=MAPS[P.map];
  if(ch==='C'&&!G.flags.crystal){/* 結界に阻まれる（isBlockedで通れないが保険） */}
  if(m.warps&&m.warps[ch]&&!(ch==='Z'&&!G.cleared)&&!(ch==='i'&&!G.flags.shrineOpen)){ // 穴/隠し階段の開通条件
    const w=m.warps[ch];
    P.map=(w.to==='village'&&G.flags.raid)?'villageB':w.to; // 襲撃後のミスト村は焼け跡
    P.x=w.x;P.y=w.y;G.trail=[];
    if({alba:1,village:1,river:1,nord:1}[w.to])G.visited[w.to]=true; // リターン先を記録
    AU.blip();updateBGM();render();return;}
  if(ch==='d'||ch==='e'){handleDock(ch);return;}
  if(ch==='t'){openTreasure(nx,ny);render();return;}
  render();
  if(m.enc&&Math.random()<(P.map==='castle'?0.10:0.08)&&G.steps>3){startBattle();}
}
// さんばし：川の主を鎮めるまで渡れない／鎮めた後は渡し船で対岸へ
function dockPos(c){
  const t=MAPS.field.tiles;
  for(let y=0;y<t.length;y++){const x=t[y].indexOf(c);if(x>=0)return{x,y};}
  return null;
}
function handleDock(ch){
  render();
  if(!G.flags.boat){
    if(ch==='d'&&G.joined.priest&&!G.flags.nushi){
      G.mode='msg';
      showMsg(['ミラ「ぬしさまを しずめます。','どうか わたしを まもってください！」','かわが さかまき、ぬしが すがたを あらわした！'],()=>{startBattle('nushi');});
      return;
    }
    G.mode='msg';
    showMsg(['ふなのりの メモ:','「かわのぬしが あばれて ふねを だせない。','リバーサイドの しんでんに そうだんを…」'],()=>{G.mode='field';});
    return;
  }
  const to=ch==='d'?dockPos('e'):dockPos('d');
  const land=ch==='d'?{x:to.x,y:to.y-1}:{x:to.x,y:to.y+1};
  G.mode='msg';
  showMsg(['ふねで '+(ch==='d'?'きたぎし':'みなみぎし')+'へ わたった。'],()=>{
    P.x=land.x;P.y=land.y;G.trail=[];G.mode='field';render();
  });
}
function openTreasure(x,y){
  const key=P.map+'_'+x+'_'+y;
  if(G.gotTreasure[key])return;
  G.gotTreasure[key]=true;
  const r=Math.random();AU.win();G.mode='msg';
  if(r<0.55){
    const gold=220+Math.floor(Math.random()*100);P.gold+=gold;
    showMsg(['たからばこを あけた！','なんと '+gold+'ゴールドが はいっていた！'],()=>{G.mode='field';});
  }else if(r<0.82){
    P.herbs+=2;
    showMsg(['たからばこを あけた！','やくそうを 2つ てにいれた！'],()=>{G.mode='field';});
  }else{
    P.waters++;
    showMsg(['たからばこを あけた！','まほうのせいすいを てにいれた！'],()=>{G.mode='field';});
  }
}

        'ガルド「……ふたり？ おれと──まさか、こいつか」',
        '「そうじゃ。ガルドよ、そなたも グランの こ。',
        'はなればなれに そだった ふたりが、いま ともに',
        'たたかっておる。これを うんめいと いわず なんという」',
        '「ロイドの ゆくえは、いまも わからぬ。じゃが',
        'まおうじょうで なにかが あったのは たしか。',
        'ゆうしゃよ──しんじつは、そなたの めで たしかめよ」']);
    }
    else if(F.crystal)say(['おうさま「けっかいを やぶったと きいた！','いざ、まおうじょうへ！ ぶうんを いのる！」']);
    else if(F.boat)say(['おうさま「かわを わたったか！ きたの ノルドの','まちで ＜けんじゃの とう＞の うわさを きくがよい。','まおうじょうの けっかいを やぶる かぎが あるはずじゃ」']);
    else if(G.joined.warrior)say(['おうさま「ガルドが なかまに なったか！','だが きたへの たいがは、ぬしが あばれて','わたれぬそうじゃ。ひがしの リバーサイドの','しんでんを たずねてみよ」']);
    else say(['おうさま「おお ゆうしゃよ、よくきた。','きたの まおうじょうに ゾルデアが よみがえった。','だが ひとりでは むぼうじゃ。','まずは にしの ミストむらに すむ','せんし ガルドを たずねるがよい」']);
    return;
  }
  // ===== 妹マリン（救出後の村）=====
  if(ch==='s'&&P.map==='villageB'){
    if(!F.raidCleared)say(['マリン「おにいちゃん……！ こわかったよう……！',
      'でも あたし、みんなを ものかげに かくしたの。','ないて なんか、ないんだから」']);
    else if(!G.cleared)say(['マリン「ガルドおにいちゃんが、やけた いえを みて',
      'ずっと だまってたの。……はじめて みる かおだった」']);
    else say(['マリン「むらは、また つくれるよ。','おにいちゃんたちが いるんだもん」']);
    return;
  }
  if(ch==='s'&&F.spider){
    say(['マリン「おにいちゃんを よろしくね！」',
      '「……ねえ。あの おおきな クモ、',
      'めが かなしそうだった。なんでだろう」']);
    return;
  }
  // ===== 村人（町ごとのヒント）=====
  if(ch==='n'){
    const hints={
      alba:F.trueClear?['「せんだいゆうしゃロイドさまの むすこが せかいを','すくったんだと。おやこ 2だいの えいゆうさまだ！」']:
        G.cleared?['「まおうの しょうたいの うわさ、きいたかい……。','なんだか、むねが つまっちまってなぁ」']:
        F.boat?['「きたの くにには つよい まものが でるらしいぜ」']:['「にしの ミストむらへは、みちを にしへ ずっとだ」'],
      village:F.trueClear?['「むらの さいけんが はじまったよ。','こんどは まえより いい むらに するんだ！」']:
        (G.cleared&&!F.trueClear)?['「どうくつの おくに、そこの みえない あなが','ひらいたって うわさだ… おそろしや」']:
        F.spider?['「マリンちゃんが ぶじで よかった…！」']:['「きたの どうくつには ちかづくなよ…','でっかい クモが すんでるんだ」'],
      river:F.trueClear?['「ぬしさまも、クモも、まおうさまも──みんな','あやつられてただけ だったんだねぇ……」']:
        G.cleared?['「へいわに なったのに、あんたたち まだ たびを？','……そうかい。やりのこしが あるんだね」']:
        F.boat?['「ぬしさまが しずまった！ あんたたちの おかげだ」']:['「ぬしの グラードさまが あばれてなぁ…','しんでんの ミラさまに そうだんしてくれ」'],
      nord:F.trueClear?['「けんじゃさまの しゅきの つづき、あんたたちが','じぶんの めで たしかめたんだねぇ」']:
        G.cleared?['「とうの けんじゃさまが のこした ことば……','＜まおうも また＞──そういう ことだったのか」']:
        F.crystal?['「けっかいが きえた…！？ すごい…」']:['「ひがしの とうに けんじゃゼフさまが すんでいる。','まおうじょうの けっかいの ことなら あのかたに」'],
    };
    say(hints[P.map]||['「よい たびを！」']);
    return;
  }
  // ===== 教会・宿・店 =====
  if(ch==='P'){openChurch();return;}
  if(ch==='I'){
    const price=INN_PRICE[P.map]||10;
    G.mode='msg';
    if(P.gold>=price)showMsg(['やどやへ ようこそ。ひとばん '+price+'ゴールドです。','…おはようございます！ みなさん げんきに なりました！'],()=>{P.gold-=price;party.forEach(m=>{if(m.hp>0){m.hp=m.maxhp;m.mp=m.maxmp;}});AU.heal();G.mode='field';});
    else showMsg(['やどやへ ようこそ。ひとばん '+price+'ゴールドです。','おきゃくさん、おかねが たりないようで…'],()=>{G.mode='field';});
    return;}
  if(ch==='S'){openShop();return;}
  // ===== 結界 =====
  if(ch==='C'&&!F.crystal){
    say(['くろい けっかいが ゆくてを はばんでいる…！','（＜やみのすいしょう＞の ちからが ひつようだ）']);
    return;
  }
  // ===== 魔王 =====
  if(ch==='B'&&!G.cleared){
    say(['ゾルデア「…よくぞ ここまで きた、にんげんども。','だが ここが きさまらの はかばだ！」'],()=>startBattle('zoldea'));
    return;}
  if(ch==='B'&&G.cleared){say(['まおうは ほろびた。へやには しずけさだけが のこる。']);return;}
}

const subWin=document.getElementById('sub-win');
function openChurch(){
  G.mode='church';G.menu={kind:'church',sel:0,items:['いのる（かいふく・そせい）','ぼうけんを きろくする','やめる']};
  renderSub('しんぷ「かみの みちびきを…」');
}
function renderSub(head){
  const m=G.menu;
  if(head)m.head=head;
  const useHead=m.head||'';
  let h=useHead?'<div style="margin-bottom:6px;color:#ffd54a;">'+useHead+'</div>':'';
  m.items.forEach((it,i)=>{
    h+='<div class="item'+(i===m.sel?' sel':'')+'" data-i="'+i+'">'+(typeof it==='string'?it:it.label)+(it&&it.price!=null?'<span class="price">'+it.price+'G</span>':'')+'</div>';
  });
  subWin.innerHTML=h;subWin.style.display='block';
  subWin.querySelectorAll('.item').forEach(el=>{el.onclick=()=>{m.sel=+el.dataset.i;subConfirm();};});
}
function subConfirm(){
  const m=G.menu;if(!m)return;
  if(m.kind==='church'){
    subWin.style.display='none';
    if(m.sel===0){
      party.forEach(mm=>{mm.hp=mm.maxhp;mm.mp=mm.maxmp;});
      AU.heal();G.mode='msg';
      showMsg(['しんぷ「そなたたちに しゅくふくを。」','（ぜんいんの HPとMPが かいふくした！）'],()=>{G.mode='field';});
    }else if(m.sel===1){
      if(!storageOK()){G.mode='msg';
        showMsg(['しんぷ「…もうしわけない、この かんきょうでは','きろくが できないようです。」','（ブラウザほぞんが つかえません）'],()=>{G.mode='field';});return;}
      G.menu={kind:'saveslot',sel:0,keys:SAVE_SLOTS.slice(),
        items:SAVE_SLOTS.map((k,i)=>({label:slotLabel(k,i)||('スロット'+(i+1)+'：─ あきち ─')})).concat([{label:'やめる'}])};
      renderSub('どの スロットに きろくする？');return;
    }else{G.mode='field';}
    return;
  }
  if(m.kind==='saveslot'){
    subWin.style.display='none';
    if(m.sel>=m.keys.length){G.mode='field';G.menu=null;return;}
    const ok=saveGame(m.keys[m.sel]);
    G.mode='msg';G.menu=null;
    if(ok){AU.save();showMsg(['しんぷ「スロット'+(m.sel+1)+'に きろくしました。」','（セーブ かんりょう！）'],()=>{G.mode='field';});}
    else showMsg(['きろくに しっぱいした…'],()=>{G.mode='field';});
    return;
  }
  if(m.kind==='shop'){confirmShop();return;}
  if(m.kind==='equip'){confirmEquip();return;}
  if(m.kind==='ftarget'){confirmFieldTarget();return;}
  if(m.kind==='btarget'){confirmBattleTarget();return;}
}
// ---------------- ショップ（装備は誰につけるか選ぶ） ----------------
function openShop(){
  G.mode='shop';G.menu={kind:'shop',sel:0,items:SHOPS[P.map].concat([{label:'やめる'}])};
  renderShopList();
}
function renderShopList(){
  const m=G.menu;
  let h='<div style="margin-bottom:6px;color:#ffd54a;">ぶきとぼうぐの みせ（G:'+P.gold+'）</div>';
  m.items.forEach((it,i)=>{
    h+='<div class="item'+(i===m.sel?' sel':'')+'" data-i="'+i+'">'+(it.name||it.label)+(it.price!=null?'<span class="price">'+it.price+'G</span>':'')+'</div>';
  });
  subWin.innerHTML=h;subWin.style.display='block';
  subWin.querySelectorAll('.item').forEach(el=>{el.onclick=()=>{m.sel=+el.dataset.i;confirmShop();};});
}
function confirmShop(){
  const m=G.menu;const it=m.items[m.sel];
  if(!it||it.label==='やめる'){closeSub();G.mode='field';return;}
  if(P.gold<it.price){G.mode='msg';subWin.style.display='none';showMsg(['おかねが たりないよ。'],()=>{G.mode='shop';renderShopList();});return;}
  if(it.kind==='h'||it.kind==='wtr'){P.gold-=it.price;
    if(it.kind==='h')P.herbs++;else P.waters++;AU.blip();
    G.mode='msg';subWin.style.display='none';
    showMsg([it.name+'を かった！（もちもの:'+(it.kind==='h'?P.herbs:P.waters)+'）'],()=>{G.mode='shop';renderShopList();});return;}
  // 武器・防具：誰に装備するか
  G.menu={kind:'equip',sel:0,item:it,items:party.map(p=>({label:p.name+'（'+(it.kind==='w'?(p.weapon?p.weapon.name:'ぶきなし'):(p.armor?p.armor.name:'よろいなし'))+'）'})).concat([{label:'やめる'}])};
  renderSub('だれに そうびする？　'+it.name);
}
function confirmEquip(){
  const m=G.menu;
  if(m.sel>=party.length){G.mode='shop';G.menu={kind:'shop',sel:0,items:SHOPS[P.map].concat([{label:'やめる'}])};renderShopList();return;}
  const it=m.item,tgt=party[m.sel];
  P.gold-=it.price;AU.blip();
  const lines=[it.name+'を かった！'];
  if(it.kind==='w'){
    if(!tgt.weapon||it.v>tgt.weapon.v){
      if(tgt.weapon)P.equipBag.push({kind:'w',name:tgt.weapon.name,v:tgt.weapon.v});
      tgt.weapon={name:it.name,v:it.v};lines.push(tgt.name+'は '+it.name+'を そうびした！');
    }else{P.equipBag.push({kind:'w',name:it.name,v:it.v});lines.push('（いまの ぶきのほうが つよいので ふくろに しまった）');}
  }else{
    if(!tgt.armor||it.v>tgt.armor.v){
      if(tgt.armor)P.equipBag.push({kind:'a',name:tgt.armor.name,v:tgt.armor.v});
      tgt.armor={name:it.name,v:it.v};lines.push(tgt.name+'は '+it.name+'を そうびした！');
    }else{P.equipBag.push({kind:'a',name:it.name,v:it.v});lines.push('（いまの よろいのほうが つよいので ふくろに しまった）');}
  }
  G.mode='msg';subWin.style.display='none';
  showMsg(lines,()=>{G.mode='shop';G.menu={kind:'shop',sel:0,items:SHOPS[P.map].concat([{label:'やめる'}])};renderShopList();});
}

function openEquipList(mi,kind){

// ワールドマップ
function openWorldMap(){
  G.mode='map';G.menu=null;
  cmdWin.style.display='none';statusWin.style.display='none';subWin.style.display='none';
  renderWorldMap();
}
function renderWorldMap(){
  const t=MAPS.field.tiles;const ts=10;
  const ox=(cv.width-t[0].length*ts)/2, oy=(cv.height-t.length*ts)/2+8;
  ctx.fillStyle='#000';ctx.fillRect(0,0,cv.width,cv.height);
  const col={'M':'#5a4a38','~':'#2a5aa0','.':'#2f8f3f','f':'#1e6f2f','r':'#c9b37e','d':'#8a6a3a','e':'#8a6a3a','t':'#ffd54a',
    'A':'#e04040','V':'#a07040','R':'#4080e0','N':'#c8c8d8','C':'#8040c0','1':'#181818','2':'#e0e0f0'};
  for(let y=0;y<t.length;y++)for(let x=0;x<t[0].length;x++){
    ctx.fillStyle=col[t[y][x]]||'#2f8f3f';ctx.fillRect(ox+x*ts,oy+y*ts,ts,ts);}
  // 現在地（屋内なら出口をたどってフィールド座標へ）
  let mp=P.map,px=P.x,py=P.y,guard=0;
  while(mp!=='field'&&guard++<4){
    const w=MAPS[mp]&&MAPS[mp].warps&&MAPS[mp].warps.D;
    if(!w)break;px=w.x;py=w.y;mp=w.to;
  }
  ctx.strokeStyle='#fff';ctx.lineWidth=2;
  ctx.strokeRect(ox+px*ts-3,oy+py*ts-3,ts+6,ts+6);ctx.lineWidth=1;
  ctx.fillStyle='#ff4040';ctx.fillRect(ox+px*ts+2,oy+py*ts+2,ts-4,ts-4);
  ctx.fillStyle='#fff';ctx.font='12px monospace';
  ctx.fillText('ルミナたいりく ぜんず',ox,oy-10);
  ctx.fillText('□=げんざいち　（A/Bで とじる）',ox,oy+t.length*ts+16);
}
// モンスターずかん
function dexDefs(){
  return ENEMIES.concat([MIDBOSS.spider,MIDBOSS.nushi,MIDBOSS.gargoyle,MIDBOSS.darga,MIDBOSS.kokuryu,MIDBOSS.kaos,BOSS]);
}
function openDex(){
  const defs=dexDefs();
  const seen=defs.filter(e=>G.dex[e.key]&&G.dex[e.key].seen>0).length;
  const items=defs.map(e=>{
    const d=G.dex[e.key];
    return (d&&d.seen>0)?e.name+'　×'+d.kill:'？？？';
  });
  G.menu={kind:'dex',sel:0,items};
  renderSub('モンスターずかん（'+seen+'/'+defs.length+'）　×=とうばつすう');
}
function openFieldMenu(){
  if(G.mode!=='field')return;
  G.mode='menu';
  G.menu={kind:'fmenu',sel:0,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};

}
function renderCmd(m,head){
  if(head)m.head=head;
  const _hd=m.head||'';
  let h=_hd?'<div class="_hd">'+_hd+'</div>':'';
  m.items.forEach((it,i)=>{h+='<div class="item'+(i===m.sel?' sel':'')+'" data-i="'+i+'">'+it+'</div>';});

  cmdWin.querySelectorAll('.item').forEach(el=>{el.onclick=()=>{m.sel=+el.dataset.i;
    if(G.mode==='battle')battleConfirm();else confirmCmd();};});
}
function renderStatus(show){
  if(!show){statusWin.style.display='none';return;}
  let h='';
  party.forEach(p=>{
    h+='<b style="color:'+(p.hp>0?'#ffd54a':'#888')+'">'+p.name+'</b> Lv'+p.lv+(p.hp<=0?'（しに）':'')+
      '<br>HP '+p.hp+'/'+p.maxhp+' MP '+p.mp+'/'+p.maxmp+
      ' こ'+mAtk(p)+' し'+mDef(p)+' す'+(p.agi||5)+'<br>'+
      '　<span style="color:#9ab">ぶき:'+(p.weapon?p.weapon.name:'なし')+' よろい:'+(p.armor?p.armor.name:'なし')+'</span><br>';
  });
  h+='G '+P.gold+'　やくそう '+P.herbs+'　せいすい '+P.waters;
  statusWin.innerHTML=h;statusWin.style.display='block';
}
function confirmCmd(){
  const m=G.menu;if(!m)return;
  if(m.kind==='fmenu'){
    const it=m.items[m.sel];
    if(it==='とじる'){cmdWin.style.display='none';statusWin.style.display='none';G.mode='field';G.menu=null;return;}
    if(it==='つよさ'){renderStatus(true);return;}
    if(it==='どうぐ'){
      G.menu={kind:'fitem',sel:0,items:['やくそう ×'+P.herbs,'まほうのせいすい ×'+P.waters,'もどる']};
      renderCmd(G.menu,'どうぐ');return;}
    if(it==='そうび'){openEquipMember();return;}
    if(it==='ちず'){openWorldMap();return;}
    if(it==='ずかん'){openDex();return;}
    if(it==='じゅもん'){
      const casts=[];
      aliveMembers().forEach(p=>{knownSpells(p).filter(sp=>['heal','healall','revive','return'].includes(sp.type)).forEach(sp=>casts.push({p,sp}));});
      if(casts.length===0){fieldInfo(['かいふくの じゅもんを つかえるものが いない。']);return;}
      G.menu={kind:'fspell',sel:0,casts,items:casts.map(c=>c.p.name+':'+c.sp.name+' MP'+c.sp.mp).concat(['もどる'])};
      renderCmd(G.menu,'どの じゅもん？');return;}
  }
  if(m.kind==='fitem'){
    if(m.sel===0){
      if(P.herbs<=0){fieldInfo(['やくそうを もっていない。']);return;}
      openFieldTarget({type:'herb'});return;}
    if(m.sel===1){
      if(P.waters<=0){fieldInfo(['まほうのせいすいを もっていない。']);return;}
      const tg=aliveMembers().filter(p=>p.maxmp>0);
      openFieldTarget({type:'water'},tg);return;}
    G.menu={kind:'fmenu',sel:1,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};renderCmd(G.menu,'メニュー');return;
  }
  if(m.kind==='fspell'){
    if(m.sel>=m.casts.length){G.menu={kind:'fmenu',sel:2,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};renderCmd(G.menu,'メニュー');return;}
    const c=m.casts[m.sel];
    if(c.p.mp<c.sp.mp){fieldInfo(['MPが たりない！']);return;}
    if(c.sp.type==='return'){
      const towns=Object.keys(G.visited).filter(k=>G.visited[k]);
      G.menu={kind:'freturn',sel:0,caster:c.p,sp:c.sp,towns,items:towns.map(t=>MAPS[t].name).concat(['やめる'])};
      renderCmd(G.menu,'どこへ もどる？');return;
    }
    if(c.sp.type==='healall'){
      c.p.mp-=c.sp.mp;AU.heal();
      const lines=[c.p.name+'は '+c.sp.name+'を となえた！'];
      aliveMembers().forEach(t=>{const heal=Math.min(c.sp.min+Math.floor(Math.random()*(c.sp.max-c.sp.min+1)),t.maxhp-t.hp);t.hp+=heal;lines.push(t.name+'の HPが '+heal+' かいふく！');});
      renderStatus(true);
      G.menu={kind:'fmenu',sel:2,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};
      fieldInfo(lines);return;
    }
    if(c.sp.type==='revive'){
      const dead=party.filter(p=>p.hp<=0);
      if(dead.length===0){fieldInfo(['たおれている なかまは いない。']);return;}
      openFieldTarget({type:'revive',caster:c.p,spell:c.sp},dead);return;
    }
    openFieldTarget({type:'spell',caster:c.p,spell:c.sp});return;
  }
  if(m.kind==='altar'){
    const say=(L)=>{G.mode='msg';showMsg(L,()=>{G.mode='field';});};
    cmdWin.style.display='none';
    if(m.sel>=party.length){G.mode='field';G.menu=null;return;}
    const p=party[m.sel];G.menu=null;
    if(p.hp<=0){G.mode='field';say(['しんでいる ものの ちは ながれない。']);return;}
    if(p.cls==='hero'||p.cls==='warrior'){
      const dmg=Math.max(1,Math.floor(p.maxhp*0.25));
      p.hp=Math.max(1,p.hp-dmg);AU.hit();render();
      G.mode='field';
      say(['さいだんが '+p.name+'の ちを こばんだ！',
        '「──けがれた ち だ！」','はげしい いたみ！ '+p.name+'に '+dmg+'の ダメージ！',
        '（つるぎを にぎる ものの ちは うけつけない ようだ）']);
    }else{
      p.hp=Math.max(1,p.hp-5);G.flags.castleSwitch=true;AU.win();render();
      G.mode='field';
      say([p.name+'は ゆびさきを さいだんに かざした。',
        'ひとしずくの ちが、こくいんに すいこまれていく──',
        'ゴゴゴゴ…… とおくで なにかが くずれる おとがした。',
        '（1かいの けっかいが きえた）']);
    }
    return;
  }
  if(m.kind==='emember'){
    if(m.sel>=party.length){G.menu={kind:'fmenu',sel:2,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};renderCmd(G.menu,'メニュー');return;}
    openEquipSlot(m.sel);return;
  }
  if(m.kind==='eslot'){
    if(m.sel===0){openEquipList(m.mi,'w');return;}
    if(m.sel===1){openEquipList(m.mi,'a');return;}
    openEquipMember();return;
  }
  if(m.kind==='elist'){
    const p=party[m.mi];
    if(m.sel<m.cands.length){ // ふくろの装備をつける（今のはふくろへ）
      const pick=m.cands[m.sel];
      const cur=(m.ekind==='w')?p.weapon:p.armor;
      if(cur)P.equipBag.push({kind:m.ekind,name:cur.name,v:cur.v});
      if(m.ekind==='w')p.weapon={name:pick.it.name,v:pick.it.v};
      else p.armor={name:pick.it.name,v:pick.it.v};
      P.equipBag.splice(pick.idx,1);
      AU.blip();openEquipSlot(m.mi);return;
    }
    if(m.hasCur&&m.sel===m.cands.length){ // はずす
      const cur=(m.ekind==='w')?p.weapon:p.armor;
      P.equipBag.push({kind:m.ekind,name:cur.name,v:cur.v});
      if(m.ekind==='w')p.weapon=null;else p.armor=null;
      AU.blip();openEquipSlot(m.mi);return;
    }
    openEquipSlot(m.mi);return; // もどる
  }
  if(m.kind==='dex'){
    closeSub();G.menu={kind:'fmenu',sel:5,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};
    renderCmd(G.menu,'メニュー');return;
  }
  if(m.kind==='freturn'){
    if(m.sel>=m.towns.length){G.menu={kind:'fmenu',sel:2,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};renderCmd(G.menu,'メニュー');return;}
    const town=m.towns[m.sel];const dst=MAPS[town].warps.D;
    m.caster.mp-=m.sp.mp;AU.spell();
    cmdWin.style.display='none';statusWin.style.display='none';G.menu=null;
    P.map='field';P.x=dst.x;P.y=dst.y;G.trail=[];updateBGM();
    G.mode='msg';render();
    showMsg([m.caster.name+'は '+m.sp.name+'を となえた！',MAPS[town].name+'の まえに もどった。'],()=>{G.mode='field';});
    return;
  }
  if(m.kind==='ftarget'){confirmFieldTarget();return;}
}
function openFieldTarget(pending,targets){
  const list=targets||aliveMembers();
  G.menu={kind:'ftarget',sel:0,pending,targets:list,
    items:list.map(p=>({label:p.name+(pending.type==='revive'?'（しに）':'（HP '+p.hp+'/'+p.maxhp+'）')})).concat([{label:'やめる'}])};
  renderSub(pending.type==='herb'?'だれに やくそう？':pending.type==='water'?'だれに せいすい？':pending.caster.name+'の '+pending.spell.name+'　だれに？');
}
function confirmFieldTarget(){
  const m=G.menu;
  if(m.sel>=m.targets.length){closeSub();G.menu={kind:'fmenu',sel:0,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};renderCmd(G.menu,'メニュー');renderStatus(true);return;}
  const tgt=m.targets[m.sel],pd=m.pending;
  closeSub();
  G.menu={kind:'fmenu',sel:0,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};
  if(pd.type==='herb'){
    P.herbs--;const heal=Math.min(20,tgt.maxhp-tgt.hp);tgt.hp+=heal;AU.heal();
    renderStatus(true);fieldInfo(['やくそうを つかった！',tgt.name+'の HPが '+heal+' かいふくした。']);
  }else if(pd.type==='water'){
    P.waters--;const rec=Math.min(30,tgt.maxmp-tgt.mp);tgt.mp+=rec;AU.heal();
    renderStatus(true);fieldInfo(['まほうのせいすいを つかった！',tgt.name+'の MPが '+rec+' かいふくした。']);
  }else if(pd.type==='revive'){
    pd.caster.mp-=pd.spell.mp;AU.heal();
    tgt.hp=Math.ceil(tgt.maxhp/2);
    renderStatus(true);fieldInfo([pd.caster.name+'は '+pd.spell.name+'を となえた！',tgt.name+'は いきかえった！（HP'+tgt.hp+'）']);
  }else{
    pd.caster.mp-=pd.spell.mp;
    const heal=Math.min(pd.spell.min+Math.floor(Math.random()*(pd.spell.max-pd.spell.min+1)),tgt.maxhp-tgt.hp);
    tgt.hp+=heal;AU.heal();
    renderStatus(true);fieldInfo([pd.caster.name+'は '+pd.spell.name+'を となえた！',tgt.name+'の HPが '+heal+' かいふくした。']);
  }
}
function fieldInfo(lines){
  G.mode='msg';showMsg(lines,()=>{
    G.mode='menu';
    if(!G.menu||G.menu.kind!=='fmenu')G.menu={kind:'fmenu',sel:0,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};
    renderCmd(G.menu,'メニュー');renderStatus(true);});
}

// ---------------- バトル（パーティ制） ----------------
function pickEnemy(){
  const byMap={cave:['bat','thief','goblin','skel'],tower:['skel','lizard','shadow','wisp'],castle:['lizard','ogre','shadow','dknight'],castle2:['ogre','shadow','dknight','troll'],depths:['troll','dknight','shadow','ogre']};
  if(byMap[P.map]){
    const pool=ENEMIES.filter(e=>byMap[P.map].includes(e.key));
    return JSON.parse(JSON.stringify(pool[Math.floor(Math.random()*pool.length)]));
  }
  const z=zoneAt(P.x,P.y);
  const pool=ENEMIES.filter(e=>e.zone===z||(e.zone===z-1&&Math.random()<0.4));
  const list=pool.length?pool:ENEMIES.filter(e=>e.zone===0);
  return JSON.parse(JSON.stringify(list[Math.floor(Math.random()*list.length)]));
}
function startBattle(kind){
  if(G.battle)return; // 二重開始ガード：進行中の戦闘を差し替えない（撃破誤表示の根本原因）
  G.msgQ=[];G.msgCb=null; // 前の場面のメッセージ残留を掃除
  G.steps=0;AU.enc();
  document.getElementById('battle-flash').classList.add('bflash');
  setTimeout(()=>document.getElementById('battle-flash').classList.remove('bflash'),450);
  let enemies=[];
  if(kind==='zoldea')enemies=[JSON.parse(JSON.stringify(BOSS))];
  else if(kind&&MIDBOSS[kind])enemies=[JSON.parse(JSON.stringify(MIDBOSS[kind]))];
  else{
    const proto=pickEnemy();
    let n=1;
    if(party.length>=2&&Math.random()<0.40)n++;
    if(party.length>=3&&Math.random()<0.18)n++;
    n=Math.min(n,3,party.length); // ソロの序盤は必ず1体
    for(let i=0;i<n;i++){
      const e=JSON.parse(JSON.stringify(proto));
      e.dispName=e.name+(n>1?String.fromCharCode(65+i):'');
      enemies.push(e);
    }
    if(Math.random()<0.04){ // レアキャラ乱入
      const sd=ENEMIES.find(x=>x.key==='syun');
      enemies=[JSON.parse(JSON.stringify(sd))];
    }
  }
  enemies.forEach(e=>{e.maxhp=e.hp;if(!e.dispName)e.dispName=e.name;
    const dx=G.dex[e.key]=G.dex[e.key]||{seen:0,kill:0};dx.seen++;});
  G.battle={enemies,named:kind||null,isBoss:kind==='zoldea',cur:0,fled:false};
  G.mode='battle';updateBGM();
  setTimeout(()=>{
    renderBattle();
    const first=enemies[0];
    const intro=[enemies.length>1?first.name+'が '+enemies.length+'たい あらわれた！':first.name+'が あらわれた！'];
    const b2=G.battle;
    if(!kind){ // 通常エンカウントのみ：たまに先制／様子見
      const r=Math.random();
      if(r<0.12){ // 敵の先制
        intro.push('てきは いきなり おそいかかってきた！');
        showMsg(intro,()=>{
          b2.phase='exec';b2.auto=false;b2.queue={};G.menu=null;
          b2.order=aliveEnemies().map(e=>({t:'e',e}));b2.cur=0;nextActor();
        });return;
      }
      if(r<0.24){ // 敵は様子見（このラウンド敵は行動しない）
        intro.push('てきは こちらを じっと みている…');
        b2.watchOnce=true;
      }
    }
    showMsg(intro,()=>{startRound();});
  },420);
}
function aliveEnemies(){return G.battle?G.battle.enemies.filter(e=>e.hp>0):[];}
function renderBattle(){
  const b=G.battle;if(!b)return;
  ctx.fillStyle='#000';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#101020';ctx.fillRect(0,0,cv.width,cv.height*0.72);
  ctx.fillStyle='#183018';ctx.fillRect(0,cv.height*0.72,cv.width,cv.height*0.28);
  ctx.fillStyle='#fff';for(let i=0;i<24;i++){ctx.fillRect((i*97)%cv.width,80+(i*53)%180,1,1);}
  // 敵（生存分を横に並べる）
  const list=aliveEnemies();
  const xs=list.length===1?[0.5]:list.length===2?[0.32,0.68]:[0.2,0.5,0.8];
  G._ePos=[];
  list.forEach((e,i)=>{
    const N=e.art.length; // アート解像度（12/24）に応じて拡大率を調整
    const scale=Math.max(1,Math.round((b.named?144:(list.length>=3?96:120))/N));
    const ox=cv.width*xs[i]-(N*scale)/2, oy=118+(i%2)*8;
    G._ePos.push({e,ox,oy,w:N*scale,h:N*scale});
    e.art.forEach((row,y)=>{for(let x=0;x<row.length;x++){const c=row[x];
      if(c==='.'||c===' ')continue;ctx.fillStyle=e.pal[+c-1]||'#fff';ctx.fillRect(ox+x*scale,oy+y*scale,scale,scale);}});
    if(list.length>1){ctx.fillStyle='#ccc';ctx.font='10px monospace';
      ctx.fillText(e.dispName.slice(-1),ox+6*scale-3,oy-4);}
  });
  if(b.named&&list[0]){const e=list[0];
    ctx.fillStyle='#400';ctx.fillRect(cv.width/2-80,96,160,8);
    ctx.fillStyle='#e04040';ctx.fillRect(cv.width/2-80,96,160*Math.max(0,e.hp)/(e.maxhp||e.hp),8);}
  // パーティの状態窓（上段・スプライトつき）
  const n=party.length;const bw=Math.floor((cv.width-8)/n);
  G._pPos=[];
  party.forEach((p,i)=>{
    const x=4+i*bw,y=4,h=76;
    G._pPos.push({x,y,bw,h});
    ctx.fillStyle='rgba(0,0,0,0.78)';ctx.fillRect(x+2,y,bw-4,h);
    ctx.strokeStyle=(b.curMember===p&&p.hp>0)?'#ffd54a':(p.hp>0?'#888':'#444');
    ctx.lineWidth=(b.curMember===p&&p.hp>0)?2:1;
    ctx.strokeRect(x+2.5,y+0.5,bw-5,h-1);ctx.lineWidth=1;
    if(p.hp>0)drawArt(CHAR_ARTS[p.cls],x+6,y+4,2);
    else{ctx.globalAlpha=0.3;drawArt(CHAR_ARTS[p.cls],x+6,y+4,2);ctx.globalAlpha=1;
      ctx.fillStyle='#c04040';ctx.font='14px monospace';ctx.fillText('✝',x+12,y+22);}
    ctx.fillStyle=p.hp>0?'#fff':'#777';ctx.font='10px monospace';
    ctx.fillText(p.name,x+34,y+14);
    ctx.fillText('HP'+p.hp,x+34,y+28);
    ctx.fillText('MP'+p.mp,x+34,y+42);
    if(p.status&&p.status.poison){ctx.fillStyle='#c060e0';ctx.fillText('どく',x+bw-30,y+14);}
    else if(p.status&&p.status.sleep>0){ctx.fillStyle='#7ab0ff';ctx.fillText('ねむり',x+bw-38,y+14);}
    ctx.fillStyle='#333';ctx.fillRect(x+6,y+h-20,bw-14,5);
    const rate=Math.max(0,p.hp)/p.maxhp;
    ctx.fillStyle=rate>0.5?'#3fd88f':rate>0.25?'#e8b33e':'#e04040';
    ctx.fillRect(x+6,y+h-20,(bw-14)*rate,5);
    ctx.fillStyle='#333';ctx.fillRect(x+6,y+h-11,bw-14,4);
    if(p.maxmp>0){ctx.fillStyle='#4a80d0';ctx.fillRect(x+6,y+h-11,(bw-14)*p.mp/p.maxmp,4);}
  });
  drainFX();
}
// ダメージ数字・被弾フラッシュ（renderBattleの直後に重ね描き）
function queueFX(item){(G._fxQ=G._fxQ||[]).push(item);}
function drainFX(){
  const q=G._fxQ||[];if(!q.length)return;G._fxQ=[];
  q.forEach((f,qi)=>{
    if(f.kind==='e'){
      const p=(G._ePos||[]).find(pp=>pp.e===f.tgt);if(!p)return;
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect(p.ox,p.oy,p.w,p.h);
      ctx.fillStyle=f.color||'#ffe07a';ctx.font='bold 20px monospace';ctx.textAlign='center';
      ctx.fillText(f.text,p.ox+p.w/2,p.oy-6-qi*3);ctx.textAlign='left';
    }else{
      const i=party.indexOf(f.mem);const p=(G._pPos||[])[i];if(!p)return;
      ctx.fillStyle=(f.color==='#8f8')?'rgba(80,220,120,0.22)':'rgba(220,60,60,0.32)';
      ctx.fillRect(p.x+2,p.y,p.bw-4,p.h);
      ctx.fillStyle=f.color||'#ff9090';ctx.font='bold 15px monospace';ctx.textAlign='center';
      ctx.fillText(f.text,p.x+p.bw/2,p.y+p.h/2+5);ctx.textAlign='left';
    }
  });
  const myBattle2=G.battle;
  setTimeout(()=>{if(G.battle&&G.battle===myBattle2)renderBattle();},380);
}
// ===== 攻撃・呪文の演出システム =====
function spellTheme(sp){
  const n=sp.name;
  if(/サンダー|スパーク/.test(n))return 'thunder';
  if(/ブレイズ|インフェルノ|フレイム/.test(n))return 'fire';
  if(/シャイン|セイント|ホーリー/.test(n))return 'holy';
  if(/カオス/.test(n))return 'dark';
  if(/メテオ/.test(n))return 'meteor';
  if(/オメガ/.test(n))return 'omega';
  return 'magic';
}
function fxPos(targets){
  return targets.map(o=>{
    if(o.t==='e'){const p=(G._ePos||[]).find(pp=>pp.e===o.e);return p?{x:p.ox,y:p.oy,w:p.w,h:p.h}:null;}
    const p=(G._pPos||[])[o.i];return p?{x:p.x,y:p.y,w:p.bw,h:p.h}:null;
  }).filter(Boolean);
}
function playFX(kind,targets,done){
  const def=FXDEFS[kind];
  if(!def||!G.battle){if(done)done();return;}
  const myBattle=G.battle; // この演出が属する戦闘
  let f=0;
  const step=()=>{
    if(G.battle!==myBattle)return; // 戦闘が終了/交代していたら完了処理ごと破棄
    renderBattle();
    fxPos(targets).forEach(p=>def.draw(p,f));
    f++;
    if(f<def.frames)setTimeout(step,def.iv);
    else setTimeout(()=>{if(G.battle===myBattle&&done)done();},def.iv);
  };
  step();
}
const FXDEFS={
 slash:{frames:4,iv:70,draw(p,f){ // 剣の斬撃：斜めに走る白銀の線＋火花
  const x1=p.x+p.w*0.85,y1=p.y+p.h*0.08,x2=p.x+p.w*0.12,y2=p.y+p.h*0.92;
  const t=Math.min(1,(f+1)/3);
  const xm=x1+(x2-x1)*t,ym=y1+(y2-y1)*t;
  ctx.strokeStyle='#fff';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(xm,ym);ctx.stroke();
  ctx.strokeStyle='#ffe9a0';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x1+6,y1+10);ctx.lineTo(xm+6,ym+10);ctx.stroke();
  ctx.lineWidth=1;
  if(f>=2){
    ctx.fillStyle='rgba(255,255,255,'+(f===2?0.45:0.18)+')';ctx.fillRect(p.x,p.y,p.w,p.h);
    [[0.2,0.3],[0.5,0.55],[0.75,0.4]].forEach(([a,b])=>{
      ctx.fillStyle='#ffd860';ctx.fillRect(p.x+p.w*a+(f-2)*3,p.y+p.h*b-(f-2)*3,3,3);});
  }
 }},
 fire:{frames:5,iv:70,draw(p,f){ // 炎：立ちのぼる火柱
  ctx.globalAlpha=0.85;
  [[0.2,0.85],[0.45,0.9],[0.7,0.82],[0.32,0.7],[0.6,0.65],[0.5,0.5]].forEach(([a,b],i)=>{
    const rise=f*p.h*0.13*(1+(i%3)*0.15);
    const r=4+((f+i)%3)*3;
    ctx.fillStyle=['#ff5020','#ff9030','#ffe080'][(f+i)%3];
    ctx.beginPath();ctx.arc(p.x+p.w*a,p.y+p.h*b-rise,r,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  if(f===4){ctx.fillStyle='rgba(255,120,40,0.3)';ctx.fillRect(p.x,p.y,p.w,p.h);}
 }},
 thunder:{frames:4,iv:70,draw(p,f){ // 雷：天からの稲妻
  if(f===0)return;
  const cx=p.x+p.w/2;
  ctx.strokeStyle=f===2?'#ffffff':'#ffe870';ctx.lineWidth=f===2?4:2.5;
  ctx.beginPath();ctx.moveTo(cx+10,0);
  ctx.lineTo(cx-8,p.y*0.4);ctx.lineTo(cx+8,p.y*0.7);ctx.lineTo(cx-4,p.y+p.h*0.5);
  ctx.stroke();ctx.lineWidth=1;
  if(f>=2){ctx.fillStyle='rgba(255,255,255,'+(f===2?0.5:0.2)+')';ctx.fillRect(p.x-4,p.y-4,p.w+8,p.h+8);}
 }},
 holy:{frames:5,iv:70,draw(p,f){ // 聖：金色の光柱
  [0.25,0.5,0.75].forEach((a,i)=>{
    const w=3+f*1.5;
    ctx.fillStyle='rgba(255,246,180,'+Math.max(0,0.25+0.1*f-i*0.04)+')';
    ctx.fillRect(p.x+p.w*a-w/2,0,w,p.y+p.h);});
  ctx.fillStyle='rgba(255,250,210,'+(f>=3?0.35:0.12)+')';
  ctx.fillRect(p.x,p.y,p.w,p.h);
 }},
 dark:{frames:5,iv:70,draw(p,f){ // 闇：収束する紫リング→爆発
  const cx=p.x+p.w/2,cy=p.y+p.h/2;
  if(f<3){const r=(3-f)*p.w*0.5+6;
    ctx.strokeStyle='#a040ff';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#d090ff';
    ctx.beginPath();ctx.arc(cx,cy,r*0.6,0,Math.PI*2);ctx.stroke();ctx.lineWidth=1;
  }else{const r=(f-2)*p.w*0.4;
    ctx.fillStyle='rgba(160,64,255,'+(0.5-(f-3)*0.2)+')';
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.fillRect(p.x,p.y,p.w,p.h);}
 }},
 meteor:{frames:6,iv:70,draw(p,f){ // メテオ：降り注ぐ隕石→着弾
  const cx=p.x+p.w/2;
  if(f<4){
    const prog=(f+1)/4;
    const sx=cx-90+prog*90,sy=-20+prog*(p.y+p.h*0.4+20);

    ctx.beginPath();ctx.moveTo(sx-18,sy-18);ctx.lineTo(sx,sy);ctx.stroke();ctx.lineWidth=1;
    ctx.fillStyle='#ffd080';ctx.beginPath();ctx.arc(sx,sy,5,0,Math.PI*2);ctx.fill();
  }else{
    const r=(f-3)*10+6;
    ctx.fillStyle='rgba(255,140,50,'+(0.6-(f-4)*0.25)+')';
    ctx.beginPath();ctx.arc(cx,p.y+p.h*0.5,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(p.x,p.y,p.w,p.h);}
 }},
 omega:{frames:6,iv:75,draw(p,f){ // オメガ：白紫の大爆発リング
  const cx=p.x+p.w/2,cy=p.y+p.h/2;
  const r=6+f*p.w*0.22;
  ctx.strokeStyle='rgba(255,255,255,'+Math.max(0,0.9-f*0.12)+')';ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle='rgba(200,120,255,'+Math.max(0,0.8-f*0.1)+')';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(cx,cy,r*0.7,0,Math.PI*2);ctx.stroke();ctx.lineWidth=1;
  if(f>=2){ctx.fillStyle='rgba(230,200,255,'+Math.max(0,0.45-(f-2)*0.1)+')';
    ctx.fillRect(p.x-8,p.y-8,p.w+16,p.h+16);}
 }},
 magic:{frames:4,iv:70,draw(p,f){ // 汎用：収束する魔力の粒
  const cx=p.x+p.w/2,cy=p.y+p.h/2;
  [[1,0],[0.5,0.87],[-0.5,0.87],[-1,0],[-0.5,-0.87],[0.5,-0.87]].forEach(([dx,dy])=>{
    const d=(3-f)*p.w*0.4+6;
    ctx.fillStyle='#60e0f0';ctx.fillRect(cx+dx*d-2,cy+dy*d-2,4,4);});
  if(f===3){ctx.fillStyle='rgba(120,230,255,0.35)';ctx.fillRect(p.x,p.y,p.w,p.h);}
 }},
 heal:{frames:5,iv:65,draw(p,f){ // 回復：舞い上がる緑の光
  ctx.fillStyle='rgba(80,220,120,0.16)';ctx.fillRect(p.x,p.y,p.w,p.h);
  [[0.2,0.9],[0.45,1.0],[0.7,0.85],[0.32,0.95],[0.6,1.05]].forEach(([a,b],i)=>{
    const y=p.y+p.h*b-f*p.h*0.2-(i%2)*4;
    if(y<p.y)return;
    ctx.fillStyle=i%2?'#a0ffc0':'#50e080';
    ctx.fillRect(p.x+p.w*a-2,y+1,7,1);ctx.fillRect(p.x+p.w*a+1,y-2,1,7);});
 }},
 water:{frames:4,iv:65,draw(p,f){ // せいすい：青のしずく
  ctx.fillStyle='rgba(80,140,240,0.15)';ctx.fillRect(p.x,p.y,p.w,p.h);
  [[0.3,0],[0.55,0.1],[0.75,0.05]].forEach(([a,b])=>{
    ctx.fillStyle='#70b0ff';
    ctx.beginPath();ctx.arc(p.x+p.w*a,p.y+p.h*(b+f*0.22),3,0,Math.PI*2);ctx.fill();});
 }},
 revive:{frames:6,iv:70,draw(p,f){ // 蘇生：黄金の光柱
  ctx.fillStyle='rgba(255,220,100,'+(0.1+f*0.05)+')';
  ctx.fillRect(p.x+p.w*0.25,Math.max(0,p.y+p.h-f*p.h*0.35),p.w*0.5,p.h);
  ctx.fillStyle='rgba(255,240,160,0.2)';ctx.fillRect(p.x,p.y,p.w,p.h);
  [[0.2,0.5],[0.8,0.35],[0.5,0.15]].forEach(([a,b],i)=>{
    if(f>=i+2){ctx.fillStyle='#ffe080';ctx.fillRect(p.x+p.w*a,p.y+p.h*b,3,3);}});
 }},
};
function rollOrder(){
  const ents=[];
  party.forEach(m=>{if(m.hp>0)ents.push({t:'m',m,roll:(m.agi||5)*(0.75+Math.random()*0.5)});});
  aliveEnemies().forEach(e=>ents.push({t:'e',e,roll:(e.agi||5)*(0.75+Math.random()*0.5)}));
  ents.sort((a,b)=>b.roll-a.roll);
  return ents;
}
function startRound(){ // コマンド入力フェーズの開始
  const b=G.battle;if(!b)return;
  if(aliveEnemies().length===0){victoryAll();return;}
  if(aliveMembers().length===0){partyWipe();return;}
  b.phase='input';b.queue={};b.inputIdx=0;b.auto=false;b.fled=false;b.curMember=null;
  if(G.tactic&&G.tactic!=='manual'){
    G.menu={kind:'round',sel:0,items:['たたかう（オート）','さくせん','にげる']};
    renderCmd(G.menu,'さくせん：'+TACTICS[G.tactic]);
    return;
  }
  inputNext();
}
function inputNext(){ // 次のメンバーのコマンド入力へ（全員そろったら実行へ）
  const b=G.battle;if(!b)return;
  while(b.inputIdx<party.length){
    const m=party[b.inputIdx];
    if(m.hp<=0){b.inputIdx++;continue;}
    if(m.status&&m.status.sleep>0){b.queue[b.inputIdx]={type:'skip'};b.inputIdx++;continue;} // 眠りは入力不可
    showInputMenu(m);return;
  }
  beginExec();
}
function showInputMenu(m){
  const b=G.battle;b.curMember=m;renderBattle();
  const items=['たたかう'];
  if(knownSpells(m).length>0)items.push('じゅもん');
  items.push('どうぐ','さくせん');
  if(!b.named)items.push('にげる');
  G.menu={kind:'battle',sel:0,items};
  renderCmd(G.menu,m.name);
}
function queueAction(act){ // コマンドを予約して次の入力へ
  const b=G.battle;if(!b)return;
  b.queue[b.inputIdx]=act;b.inputIdx++;inputNext();
}
function undoInput(){ // Bで前のメンバーの入力へ戻る
  const b=G.battle;if(!b||b.phase!=='input')return;
  let i=b.inputIdx-1;
  while(i>=0&&(party[i].hp<=0||(party[i].status&&party[i].status.sleep>0)))i--;
  if(i<0)return;
  delete b.queue[i];b.inputIdx=i;AU.blip();
  showInputMenu(party[i]);
}
function beginExec(){ // すばやさ順で一斉実行
  const b=G.battle;if(!b)return;
  b.phase='exec';b.curMember=null;G.menu=null; // 入力メニューの状態も破棄（連打での再確定を防ぐ）
  b.order=rollOrder();
  if(b.watchOnce){b.order=b.order.filter(o=>o.t==='m');b.watchOnce=false;} // 敵は様子を見ている
  b.cur=0;
  cmdWin.style.display='none';
  nextActor();
}
function nextActor(){ // 実行フェーズの進行
  const b=G.battle;if(!b||b.fled)return;
  while(b.cur<b.order.length){
    const o=b.order[b.cur];
    if(o.t==='m'){
      const m=o.m;
      if(m.hp<=0){b.cur++;continue;}
      if(m.status&&m.status.poison&&!o.ticked){
        o.ticked=true;
        const d=3+Math.floor(Math.random()*4);
        m.hp=Math.max(0,m.hp-d);
        queueFX({kind:'m',mem:m,text:'-'+d,color:'#c060e0'});
        renderBattle();
        const lines=[m.name+'は どくに むしばまれている…（'+d+'ダメージ）'];
        if(m.hp<=0){lines.push(m.name+'は たおれた…');
          showMsg(lines,()=>{b.cur++;if(aliveMembers().length===0){partyWipe();}else nextActor();});return;}
        showMsg(lines,()=>nextActor());return;
      }
      if(m.status&&m.status.sleep>0){
        if(Math.random()<0.45){m.status.sleep=0;
          showMsg([m.name+'は めを さました！'],()=>{execMember(m);});return;}
        m.status.sleep--;
        showMsg([m.name+'は ねむっている…'],()=>{b.cur++;nextActor();});return;
      }
      execMember(m);return;
    }else{
      const e=o.e;
      if(e.hp<=0){b.cur++;continue;}
      enemyAct(e);return;
    }
  }
  startRound(); // ラウンド終了 → 次の入力フェーズへ
}
function execMember(m){
  const b=G.battle;b.curMember=m;renderBattle();
  if(b.auto){aiAct(m);return;}
  execAction(m,b.queue[party.indexOf(m)]||{type:'skip'});
}
function execAction(m,act){ // 予約コマンドの実行（対象が倒れていたら生存対象へ）
  const b=G.battle;
  const lowestEnemy=()=>aliveEnemies().slice().sort((a,c)=>a.hp-c.hp)[0];
  const lowestAlly=()=>aliveMembers().slice().sort((a,c)=>a.hp/a.maxhp-c.hp/c.maxhp)[0];
  if(act.type==='skip'){
    showMsg([m.name+'は めを さましたばかりで うごけない！'],()=>advanceActor());return;
  }
  if(act.type==='attack'){
    const tgt=(act.tgt&&act.tgt.hp>0)?act.tgt:lowestEnemy();
    if(!tgt){advanceActor();return;}
    doAttack(m,tgt);return;
  }
  if(act.type==='herb'){
    if(P.herbs<=0){showMsg([m.name+'は やくそうを もっていなかった！'],()=>advanceActor());return;}
    const tgt=(act.tgt&&act.tgt.hp>0)?act.tgt:lowestAlly();
    AU.heal();
    playFX('heal',[{t:'m',i:party.indexOf(tgt)}],()=>{
      P.herbs--;const heal=Math.min(20,tgt.maxhp-tgt.hp);tgt.hp+=heal;
      queueFX({kind:'m',mem:tgt,text:'+'+heal,color:'#8f8'});renderBattle();
      const hl=[m.name+'は やくそうを つかった！',tgt.name+'の HPが '+heal+' かいふく！'];
      if(tgt.status&&tgt.status.poison){tgt.status.poison=false;hl.push(tgt.name+'の どくが きえた！');}
      showMsg(hl,()=>advanceActor());
    });return;
  }
  if(act.type==='water'){
    if(P.waters<=0){showMsg([m.name+'は まほうのせいすいを もっていなかった！'],()=>advanceActor());return;}
    const tgt=(act.tgt&&act.tgt.hp>0)?act.tgt:m;
    AU.heal();
    playFX('water',[{t:'m',i:party.indexOf(tgt)}],()=>{
      P.waters--;const rec=Math.min(30,tgt.maxmp-tgt.mp);tgt.mp+=rec;
      queueFX({kind:'m',mem:tgt,text:'+'+rec+'MP',color:'#8f8'});renderBattle();
      showMsg([m.name+'は まほうのせいすいを つかった！',tgt.name+'の MPが '+rec+' かいふく！'],()=>advanceActor());
    });return;
  }
  if(act.type==='spell'){
    const sp=act.sp;
    if(m.mp<sp.mp){showMsg([m.name+'は '+sp.name+'を となえようとしたが','MPが たりなかった！'],()=>advanceActor());return;}
    if(sp.type==='dmg'){
      const tgt=(act.tgt&&act.tgt.hp>0)?act.tgt:lowestEnemy();
      if(!tgt){advanceActor();return;}
      castDamage(m,sp,tgt);return;
    }
    if(sp.type==='dmgall'){
      m.mp-=sp.mp;AU.spell();
      const es2=aliveEnemies();
      playFX(spellTheme(sp),es2.map(t=>({t:'e',e:t})),()=>{
        const lines=[m.name+'は '+sp.name+'を となえた！'];
        es2.forEach(t=>{
          if(t.key==='syun'){lines.push('スュンさんには きかない！');return;}
          const dmg=sp.min+Math.floor(Math.random()*(sp.max-sp.min+1));
          t.hp-=dmg;queueFX({kind:'e',tgt:t,text:String(dmg),color:'#ff9a5a'});
          lines.push(t.dispName+'に '+dmg+'の ダメージ！');
          if(t.hp<=0)lines.push(t.dispName+'を たおした！');
        });
        resolveOffense(lines);
      });return;
    }
    if(sp.type==='heal'){
      const tgt=(act.tgt&&act.tgt.hp>0)?act.tgt:lowestAlly();
      m.mp-=sp.mp;AU.spell();
      playFX('heal',[{t:'m',i:party.indexOf(tgt)}],()=>{
        const heal=Math.min(sp.min+Math.floor(Math.random()*(sp.max-sp.min+1)),tgt.maxhp-tgt.hp);
        tgt.hp+=heal;queueFX({kind:'m',mem:tgt,text:'+'+heal,color:'#8f8'});renderBattle();
        showMsg([m.name+'は '+sp.name+'を となえた！',tgt.name+'の HPが '+heal+' かいふく！'],()=>advanceActor());
      });return;
    }
    if(sp.type==='healall'){
      m.mp-=sp.mp;AU.heal();
      const al=aliveMembers();
      playFX('heal',al.map(t=>({t:'m',i:party.indexOf(t)})),()=>{
        const lines=[m.name+'は '+sp.name+'を となえた！'];
        al.forEach(t=>{
          const heal=Math.min(sp.min+Math.floor(Math.random()*(sp.max-sp.min+1)),t.maxhp-t.hp);
          t.hp+=heal;queueFX({kind:'m',mem:t,text:'+'+heal,color:'#8f8'});
          lines.push(t.name+'の HPが '+heal+' かいふく！');
        });
        renderBattle();showMsg(lines,()=>advanceActor());
      });return;
    }
    if(sp.type==='revive'){
      const tgt=(act.tgt&&act.tgt.hp<=0)?act.tgt:party.filter(p=>p.hp<=0)[0];
      if(!tgt){showMsg([m.name+'は '+sp.name+'を となえたが','なにも おこらなかった。'],()=>advanceActor());return;}
      m.mp-=sp.mp;AU.heal();
      playFX('revive',[{t:'m',i:party.indexOf(tgt)}],()=>{
        tgt.hp=Math.ceil(tgt.maxhp/2);
        queueFX({kind:'m',mem:tgt,text:'復活!',color:'#8f8'});renderBattle();
        showMsg([m.name+'は '+sp.name+'を となえた！',tgt.name+'は いきかえった！'],()=>advanceActor());
      });return;
    }
  }
  advanceActor();
}
function nextActorMenu(){ // メニューから「もどる」等で現在の入力者へ
  const b=G.battle;if(!b)return;
  if(b.phase==='input'){
    const m=party[b.inputIdx];
    if(m&&m.hp>0)showInputMenu(m);else inputNext();
    return;
  }
  nextActor();
}
function openTacticMenu(){
  const keys=['manual','gungan','inochi'];
  G.menu={kind:'tactic',sel:keys.indexOf(G.tactic),
    items:keys.map(k=>TACTICS[k]+(G.tactic===k?' ●':'')).concat(['もどる'])};
  renderCmd(G.menu,'さくせん');
}
// さくせんAI：シミュレータ検証済みポリシーの移植
function aiAct(m){
  const b=G.battle;if(!b)return;
  const sps=knownSpells(m).filter(sp=>sp.type!=='return');
  const byType=t=>sps.filter(sp=>sp.type===t).sort((a,b2)=>(b2.max||0)-(a.max||0));
  const dead=party.filter(p=>p.hp<=0);
  const alive=aliveMembers();
  const lowest=alive.slice().sort((a,b2)=>a.hp/a.maxhp-b2.hp/b2.maxhp)[0];
  const es=aliveEnemies();
  const target=es.slice().sort((a,b2)=>a.hp-b2.hp)[0];
  // 回復閾値は役割別：僧侶は手厚く、それ以外は瀕死時のみ（火力を保つ）
  const thr=(m.cls==='priest')?(G.tactic==='inochi'?0.7:0.55):(G.tactic==='inochi'?0.45:0.3);
  // 0) MPが尽きかけたら まほうのせいすい（呪文職のみ）
  if(P.waters>0&&m.maxmp>0&&sps.length){
    const minCost=Math.min.apply(null,sps.map(x=>x.mp));
    if(m.mp<minCost||(m.cls==='priest'&&m.mp<10)){
      AU.heal();
      playFX('water',[{t:'m',i:party.indexOf(m)}],()=>{
        P.waters--;const rec=Math.min(30,m.maxmp-m.mp);m.mp+=rec;
        queueFX({kind:'m',mem:m,text:'+'+rec+'MP',color:'#8f8'});renderBattle();
        showMsg([m.name+'は まほうのせいすいを のんだ！','MPが '+rec+' かいふく！'],()=>advanceActor());
      });return;
    }
  }
  // 1) 蘇生
  const rev=byType('revive')[0];
  if(rev&&dead.length&&m.mp>=rev.mp){
    m.mp-=rev.mp;AU.heal();const t=dead[0];
    playFX('revive',[{t:'m',i:party.indexOf(t)}],()=>{
      t.hp=Math.ceil(t.maxhp/2);
      queueFX({kind:'m',mem:t,text:'復活!',color:'#8f8'});renderBattle();
      showMsg([m.name+'は '+rev.name+'を となえた！',t.name+'は いきかえった！'],()=>advanceActor());
    });return;
  }
  // 2) 全体回復
  const ha=byType('healall')[0];
  if(ha&&m.mp>=ha.mp&&alive.filter(p=>p.hp<p.maxhp*0.6).length>=2){
    m.mp-=ha.mp;AU.heal();
    playFX('heal',alive.map(t=>({t:'m',i:party.indexOf(t)})),()=>{
      const lines=[m.name+'は '+ha.name+'を となえた！'];
      alive.forEach(t=>{const heal=Math.min(ha.min+Math.floor(Math.random()*(ha.max-ha.min+1)),t.maxhp-t.hp);
        t.hp+=heal;queueFX({kind:'m',mem:t,text:'+'+heal,color:'#8f8'});
        lines.push(t.name+'の HPが '+heal+' かいふく！');});
      renderBattle();showMsg(lines,()=>advanceActor());
    });return;
  }
  // 3) 単体回復
  if(lowest&&lowest.hp<lowest.maxhp*thr){
    const missing=lowest.maxhp-lowest.hp;
    const hs=byType('heal').filter(x=>m.mp>=x.mp);
    const sp=hs.sort((a,b2)=>Math.abs((a.min+a.max)/2-missing)-Math.abs((b2.min+b2.max)/2-missing))[0];
    if(sp){
      m.mp-=sp.mp;AU.spell();
      playFX('heal',[{t:'m',i:party.indexOf(lowest)}],()=>{
        const heal=Math.min(sp.min+Math.floor(Math.random()*(sp.max-sp.min+1)),missing);
        lowest.hp+=heal;queueFX({kind:'m',mem:lowest,text:'+'+heal,color:'#8f8'});renderBattle();
        showMsg([m.name+'は '+sp.name+'を となえた！',lowest.name+'の HPが '+heal+' かいふく！'],()=>advanceActor());
      });return;
    }
    if(P.herbs>0&&lowest.hp<lowest.maxhp*0.4){
      AU.heal();
      playFX('heal',[{t:'m',i:party.indexOf(lowest)}],()=>{
        P.herbs--;const heal=Math.min(20,missing);lowest.hp+=heal;
        queueFX({kind:'m',mem:lowest,text:'+'+heal,color:'#8f8'});renderBattle();
        const hl=[m.name+'は やくそうを つかった！',lowest.name+'の HPが '+heal+' かいふく！'];
        if(lowest.status&&lowest.status.poison){lowest.status.poison=false;hl.push(lowest.name+'の どくが きえた！');}
        showMsg(hl,()=>advanceActor());
      });return;
    }
  }
  // 4) 攻撃呪文（いのちだいじには温存気味・ネームド戦は解禁）
  const canSpell=G.tactic==='gungan'||b.named||m.cls==='mage';
  if(canSpell){
    const da=byType('dmgall').filter(x=>m.mp>=x.mp)[0];
    if(da&&es.length>=2){
      m.mp-=da.mp;AU.spell();
      playFX(spellTheme(da),es.map(t=>({t:'e',e:t})),()=>{
        const lines=[m.name+'は '+da.name+'を となえた！'];
        es.forEach(t=>{
          if(t.key==='syun'){lines.push('スュンさんには きかない！');return;}
          const dmg=da.min+Math.floor(Math.random()*(da.max-da.min+1));
          t.hp-=dmg;queueFX({kind:'e',tgt:t,text:String(dmg),color:'#ff9a5a'});
          lines.push(t.dispName+'に '+dmg+'の ダメージ！');
          if(t.hp<=0)lines.push(t.dispName+'を たおした！');});
        resolveOffense(lines);
      });return;
    }
    const ds=byType('dmg').filter(x=>m.mp>=x.mp)[0];
    if(ds&&(G.tactic!=='inochi'||m.mp>=m.maxmp*0.3)){castDamage(m,ds,target);return;}
  }
  doAttack(m,target);
}
function enemyAct(e){
  const b=G.battle;if(!b)return;
  b.curMember=null;
  if(e.key==='syun'&&Math.random()<0.5){ // 逃げ足の早さ
    e.fled=true;e.hp=0;renderBattle();
    if(aliveEnemies().length===0){
      showMsg(['スュンさんは かぜのように さっていった…'],()=>endBattle());return;
    }
    showMsg(['スュンさんは かぜのように さっていった…'],()=>{b.cur++;nextActor();});return;
  }
  if(b.isBoss&&!e.phase2&&e.hp>0&&e.hp<=e.maxhp/2){ // 魔王の変身
    e.phase2=true;
    e.art=BOSS.art2;e.pal=BOSS.pal2;
    e.atk=Math.round(e.atk*1.3);
    if(e.aoe){e.aoe.p=Math.min(0.5,e.aoe.p+0.12);e.aoe.lo+=3;e.aoe.hi+=5;e.aoe.name='むすうの しょくしゅ';}
    document.getElementById('battle-flash').classList.add('bflash');
    setTimeout(()=>document.getElementById('battle-flash').classList.remove('bflash'),450);
    AU.enc();renderBattle();
    showMsg(['ゾルデアの よろいが くだけちった！！',
      'なかから あらわれたのは──',
      'ことばに できない、なにか だった。',
      'むすうの めが、いっせいに こちらを みた。'],()=>{b.cur++;nextActor();});
    return;
  }
  let lines=[];
  const acts=e.acts||1;
  for(let k=0;k<acts;k++){
    const alive=aliveMembers();
    if(alive.length===0)break;
    if(e.aoe&&Math.random()<e.aoe.p){
      lines.push(e.dispName+'は '+e.aoe.name+'を はなった！');
      alive.forEach(mem=>{
        const d=e.aoe.lo+Math.floor(Math.random()*(e.aoe.hi-e.aoe.lo+1));
        mem.hp-=d;queueFX({kind:'m',mem,text:'-'+d});
        lines.push(mem.name+'は '+d+'の ダメージ！');
        if(mem.hp<=0){mem.hp=0;lines.push(mem.name+'は たおれた…');}
      });
    }else{
      const tgt=alive[Math.floor(Math.random()*alive.length)];
      const d=Math.max(1,e.atk-Math.floor(mDef(tgt)/2)+Math.floor(Math.random()*5)-2);
      tgt.hp-=d;queueFX({kind:'m',mem:tgt,text:'-'+d});
      lines.push(e.dispName+'の こうげき！',tgt.name+'は '+d+'の ダメージを うけた！');
      if(tgt.hp<=0){tgt.hp=0;lines.push(tgt.name+'は たおれた…');}
      else if(e.inflict&&Math.random()<e.inflict.p){
        if(e.inflict.type==='poison'&&!(tgt.status&&tgt.status.poison)){
          tgt.status=tgt.status||{};tgt.status.poison=true;
          lines.push(tgt.name+'は どくを うけた！');
        }else if(e.inflict.type==='sleep'&&!(tgt.status&&tgt.status.sleep>0)){
          tgt.status=tgt.status||{};tgt.status.sleep=2;
          lines.push(tgt.name+'は ねむらされてしまった！');
        }
      }
    }
  }
  AU.hit();renderBattle();
  if(aliveMembers().length===0){showMsg(lines.concat(['ぜんめつ してしまった…']),()=>partyWipe());return;}
  showMsg(lines,()=>{b.cur++;nextActor();});
}
function battleConfirm(){
  const m=G.menu,b=G.battle;if(!m||!b)return;
  if(b.phase==='exec')return; // 実行中に残留メニューを確定させない
  const actor=b.curMember;
  if(m.kind==='battle'){
    const it=m.items[m.sel];cmdWin.style.display='none';
    if(it==='たたかう'){
      const es=aliveEnemies();
      if(es.length>1){openEnemyTarget(actor,{act:'attack'});return;}
      queueAction({type:'attack',tgt:es[0]});
    }
    else if(it==='じゅもん'){
      const sps=knownSpells(actor).filter(sp=>sp.type!=='return');
      G.menu={kind:'bspell',sel:0,items:sps.map(s=>s.name+' MP'+s.mp).concat(['もどる']),spells:sps};
      renderCmd(G.menu,actor.name);
    }
    else if(it==='どうぐ'){
      G.menu={kind:'bitem',sel:0,actor,items:['やくそう ×'+P.herbs,'まほうのせいすい ×'+P.waters,'もどる']};
      renderCmd(G.menu,'どうぐ');return;
    }
    else if(it==='さくせん'){openTacticMenu();return;}
    else if(it==='にげる'){
      if(Math.random()<0.6){AU.blip();b.fled=true;showMsg(['うまく にげきった！'],()=>endBattle(false));}
      else showMsg(['にげられなかった！'],()=>{
        b.phase='exec';b.auto=false;G.menu=null;
        b.order=aliveEnemies().map(e=>({t:'e',e}));b.cur=0;nextActor();});
    }
    return;
  }
  if(m.kind==='bspell'){
    if(m.sel>=m.spells.length){cmdWin.style.display='none';nextActorMenu();return;}
    const sp=m.spells[m.sel];cmdWin.style.display='none';
    if(actor.mp<sp.mp){showMsg(['MPが たりない！'],()=>nextActorMenu());return;}
    if(sp.type==='heal'){openBattleTarget(actor,{type:'spell',spell:sp});return;}
    if(sp.type==='revive'){
      const dead=party.filter(p=>p.hp<=0);
      if(dead.length===0){showMsg(['たおれている なかまは いない。'],()=>nextActorMenu());return;}
      openBattleTarget(actor,{type:'revive',spell:sp});return;
    }
    if(sp.type==='healall'||sp.type==='dmgall'){queueAction({type:'spell',sp});return;}
    // 単体攻撃呪文
    const es=aliveEnemies();
    if(es.length>1){openEnemyTarget(actor,{act:'spell',spell:sp});return;}
    queueAction({type:'spell',sp,tgt:es[0]});
    return;
  }
  if(m.kind==='round'){
    const it=m.items[m.sel];cmdWin.style.display='none';
    if(it==='たたかう（オート）'){b.phase='exec';b.auto=true;G.menu=null;b.order=rollOrder();b.cur=0;nextActor();return;}
    if(it==='さくせん'){openTacticMenu();return;}
    // にげる
    if(b.named){showMsg(['まわりこまれて にげられない！'],()=>startRound());return;}
    if(Math.random()<0.6){AU.blip();b.fled=true;showMsg(['うまく にげきった！'],()=>endBattle(false));}
    else showMsg(['にげられなかった！'],()=>{b.phase='exec';b.auto=false;
      b.order=aliveEnemies().map(e=>({t:'e',e}));b.cur=0;nextActor();});
    return;
  }
  if(m.kind==='tactic'){
    const keys=['manual','gungan','inochi'];
    cmdWin.style.display='none';
    if(m.sel<keys.length){G.tactic=keys[m.sel];AU.blip();
      showMsg(['さくせんを「'+TACTICS[G.tactic]+'」に へんこうした！'],()=>startRound());return;}
    startRound();return;
  }
  if(m.kind==='bitem'){
    cmdWin.style.display='none';
    if(m.sel===0){
      if(P.herbs<=0){showMsg(['やくそうを もっていない。'],()=>nextActorMenu());return;}
      openBattleTarget(m.actor,{type:'herb'});return;}
    if(m.sel===1){
      if(P.waters<=0){showMsg(['まほうのせいすいを もっていない。'],()=>nextActorMenu());return;}
      openBattleTarget(m.actor,{type:'water'});return;}
    nextActorMenu();return;
  }
  if(m.kind==='btarget'){confirmBattleTarget();return;}
  if(m.kind==='etarget'){confirmEnemyTarget();return;}
}

function confirmEnemyTarget(){

function castDamage(actor,sp,tgt){
  actor.mp-=sp.mp;AU.spell();
  if(tgt.key==='syun'){ // 魔法は効かない
    playFX(spellTheme(sp),[{t:'e',e:tgt}],()=>{
      resolveOffense([actor.name+'は '+sp.name+'を となえた！','だが スュンさんには じゅもんが きかなかった！']);
    });return;
  }
  const dmg=sp.min+Math.floor(Math.random()*(sp.max-sp.min+1));
  playFX(spellTheme(sp),[{t:'e',e:tgt}],()=>{ // 呪文ごとの演出→ダメージ確定
    tgt.hp-=dmg;
    queueFX({kind:'e',tgt,text:String(dmg),color:'#9ad0ff'});
    const lines=[actor.name+'は '+sp.name+'を となえた！',tgt.dispName+'に '+dmg+'の ダメージ！'];
    if(tgt.hp<=0)lines.push(tgt.dispName+'を たおした！');
    resolveOffense(lines);
  });
}
function resolveOffense(lines){
  const myBattle=G.battle;
  renderBattle();
  showMsg(lines,()=>{ // 勝利/続行はメッセージを読み終えた時点の状態で判定
    if(G.battle!==myBattle||!G.battle)return;
    if(aliveEnemies().length===0)victoryAll();
    else advanceActor();
  });
}
function nextActorMenu(){
  // 同じ行動者のコマンドをやり直す
  const b=G.battle;if(!b)return;
  renderBattle();
  const items=['たたかう'];
  if(knownSpells(b.curMember).length>0)items.push('じゅもん');
  items.push('どうぐ');
  if(!b.named)items.push('にげる');
  G.menu={kind:'battle',sel:0,items};
  renderCmd(G.menu,b.curMember.name);
}
function openBattleTarget(actor,pending){
  const targets=pending.type==='revive'?party.filter(p=>p.hp<=0):aliveMembers();
  G.menu={kind:'btarget',sel:0,actor,pending,targets,
    items:targets.map(p=>({label:p.name+(pending.type==='revive'?'（しに）':'（HP '+p.hp+'/'+p.maxhp+'）')})).concat([{label:'もどる'}])};
  renderSub(pending.type==='herb'?'だれに やくそう？':actor.name+'の '+(pending.spell?pending.spell.name:'')+'　だれに？');

function confirmBattleTarget(){
  const m=G.menu,b=G.battle;if(!m||!b)return;
  subWin.style.display='none';G.menu=null;
  if(m.sel>=m.targets.length){nextActorMenu();return;} // もどる
  const tgt=m.targets[m.sel];const pd=m.pending;
  if(pd.type==='herb')queueAction({type:'herb',tgt});
  else if(pd.type==='water')queueAction({type:'water',tgt});

}
function doAttack(actor,tgt){
  const crit=Math.random()<1/16;
  let dmg=Math.max(1,mAtk(actor)-Math.floor(tgt.def/2)+Math.floor(Math.random()*5)-2);
  if(crit)dmg=Math.floor(dmg*2);
  if(tgt.key==='syun')dmg=crit?2:1; // 防御力最強
  AU.hit();
  playFX('slash',[{t:'e',e:tgt}],()=>{ // 斬撃演出→ダメージ確定
    tgt.hp-=dmg;
    queueFX({kind:'e',tgt,text:String(dmg)+(crit?'!!':''),color:crit?'#ff8a5a':'#ffe07a'});
    const lines=[actor.name+'の こうげき！'];
    if(crit)lines.push('かいしんの いちげき！！');
    lines.push(tgt.dispName+'に '+dmg+'の ダメージ！');
    if(tgt.hp<=0)lines.push(tgt.dispName+'を たおした！');
    resolveOffense(lines);
  });
}
function advanceActor(){
  const b=G.battle;if(!b)return;

function victoryAll(){
  const b=G.battle;
  if(b.isBoss){winBoss();return;}
  AU.win();
  if(b.named){midbossVictory(b.named);return;}
  b.enemies.forEach(e=>{if(e.fled)return;const dx=G.dex[e.key]=G.dex[e.key]||{seen:1,kill:0};dx.kill++;});
  const exp=b.enemies.reduce((a,e)=>a+(e.fled?0:e.exp),0);
  const gold=b.enemies.reduce((a,e)=>a+(e.fled?0:e.gold),0);
  P.gold+=gold;
  const syunKill=b.enemies.some(e=>e.key==='syun'&&!e.fled);
  const lines=[b.enemies.length>1?'まものの むれを たおした！':b.enemies[0].name+'を たおした！',
    'けいけんち '+exp+'、'+gold+'ゴールドを かくとく！'];
  if(syunKill){
    P.equipBag.push({kind:'a',name:'スュンのサングラス',v:15});
    lines.push('スュンさんは サングラスを おとしていった！','（そうびぶくろに しまった）');
  }
  let leveled=false;
  aliveMembers().forEach(mem=>{
    mem.exp+=exp;
    while(mem.exp>=expNext(mem)){
      mem.exp-=expNext(mem);mem.lv++;leveled=true;
      const g=CLASSES[mem.cls].g;
      mem.maxhp+=g.hp;mem.maxmp+=g.mp;mem.batk+=g.atk;mem.bdef+=g.def;if(mem.lv%2===0)mem.agi=(mem.agi||5)+(g.agi||1);
      mem.hp=mem.maxhp;mem.mp=mem.maxmp;
      lines.push(mem.name+'は レベル'+mem.lv+'に あがった！');
      const newSp=CLASSES[mem.cls].learns.find(l=>l.lv===mem.lv);
      if(newSp)lines.push(mem.name+'は '+SPELL_DEFS[newSp.key].name+'を おぼえた！');
    }
  });
  if(leveled)AU.lvup();
  showMsg(lines,()=>endBattle(true));
}

      showMsg([
        '……あさだ。ゆめか。',
        'おうと アルバ ── きょう、おしろに よばれている。',
        'ここから、たびが はじまる。',
        '（Aボタン:はなす・しらべる ／ Bボタン:メニュー）'],()=>{G.mode='field';});
    });
  }
}

// ---------------- 入力 ----------------
function pressA(){
  if(G.mode==='map'){G.mode='field';render();return;}
  AU.init();
  if(G.mode==='title'){titleConfirm();return;}
  if(msgWin.style.display==='block'){advanceMsg();return;}
  if(G.mode==='field'){interact();return;}
  if(G.mode==='menu'){confirmCmd();return;}
  if(G.mode==='battle'&&G.menu){
    if(G.menu.kind==='btarget')confirmBattleTarget();else battleConfirm();return;}
  if(G.mode==='shop'){
    if(G.menu&&G.menu.kind==='equip')confirmEquip();else confirmShop();return;}
  if(G.mode==='church'){subConfirm();return;}
}
function pressB(){
  if(G.mode==='map'){G.mode='field';render();return;}
  if(msgWin.style.display==='block')return;
  if(G.mode==='field'){openFieldMenu();return;}
  if(G.mode==='menu'){
    if(G.menu&&G.menu.kind==='dex'){closeSub();G.menu={kind:'fmenu',sel:5,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};renderCmd(G.menu,'メニュー');return;}
    if(G.menu&&G.menu.kind==='altar'){cmdWin.style.display='none';G.menu=null;G.mode='field';return;}
    if(G.menu&&G.menu.kind==='emember'){G.menu={kind:'fmenu',sel:2,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};renderCmd(G.menu,'メニュー');return;}
    if(G.menu&&G.menu.kind==='eslot'){openEquipMember();return;}
    if(G.menu&&G.menu.kind==='elist'){openEquipSlot(G.menu.mi);return;}
    if(G.menu&&(G.menu.kind==='ftarget'||G.menu.kind==='fspell'||G.menu.kind==='fitem'||G.menu.kind==='freturn')){closeSub();G.menu={kind:'fmenu',sel:0,items:['つよさ','どうぐ','そうび','じゅもん','ちず','ずかん','とじる']};renderCmd(G.menu,'メニュー');return;}
    cmdWin.style.display='none';statusWin.style.display='none';G.mode='field';G.menu=null;return;}
  if(G.mode==='shop'){
    if(G.menu&&G.menu.kind==='equip'){G.menu={kind:'shop',sel:0,items:SHOPS[P.map].concat([{label:'やめる'}])};renderShopList();return;}
    closeSub();G.mode='field';return;}
  if(G.mode==='church'){closeSub();G.mode='field';return;}
  if(G.mode==='battle'&&G.menu){
    if(G.menu.kind==='bspell'){cmdWin.style.display='none';nextActorMenu();return;}
    if(G.menu.kind==='btarget'){closeSub();nextActorMenu();return;}
    if(!G.menu)return;
    if(G.menu.kind==='etarget'||G.menu.kind==='bitem'){cmdWin.style.display='none';nextActorMenu();return;}
    if(G.menu.kind==='battle'&&G.battle&&G.battle.phase==='input'){undoInput();return;}
    if(G.menu.kind==='tactic'){cmdWin.style.display='none';startRound();return;}
    if(G.menu.kind==='round'){return;}
  }
}
function curMenuLen(){
  const m=G.menu;if(!m)return 0;
  return m.items.length;
}
function moveSel(d){
  if(G.mode==='title'){titleSel=(titleSel+d+titleItems.length)%titleItems.length;renderTitle();AU.blip();return;}
  const m=G.menu;if(!m)return;
  m.sel=(m.sel+d+m.items.length)%m.items.length;
  if(m.kind==='shop')renderShopList();
  else if(['battle','bspell','etarget','bitem','round','tactic','fmenu','fspell','fitem','freturn','emember','eslot','elist','altar'].includes(m.kind))renderCmd(m); // コマンド窓系（ヘッダーはm.headに記憶済み）
  else renderSub(''); // サブ窓系（shop以外：equip/church/ftarget/btarget）
  AU.blip();
}
window.addEventListener('keydown',e=>{
  const inMenu=(G.mode==='title'||((G.mode==='menu'||G.mode==='shop'||G.mode==='church'||(G.mode==='battle'&&G.menu))&&msgWin.style.display!=='block'));
  switch(e.key){
    case 'ArrowUp': inMenu?moveSel(-1):tryMove(0,-1);break;
    case 'ArrowDown': inMenu?moveSel(1):tryMove(0,1);break;
    case 'ArrowLeft': if(!inMenu)tryMove(-1,0);break;
    case 'ArrowRight': if(!inMenu)tryMove(1,0);break;
    case 'z': case 'Z': case 'Enter': pressA();break;
    case 'x': case 'X': case 'Escape': pressB();break;
  }
});
let holdTimer=null;
function bindPad(id,dx,dy){
  const el=document.getElementById(id);
  const start=(ev)=>{ev.preventDefault();AU.init();
    const inMenu=(G.mode==='title'||((G.mode==='menu'||G.mode==='shop'||G.mode==='church'||(G.mode==='battle'&&G.menu))&&msgWin.style.display!=='block'));
    if(inMenu){if(dy!==0)moveSel(dy);return;}
    tryMove(dx,dy);
    clearInterval(holdTimer);holdTimer=setInterval(()=>tryMove(dx,dy),150);};
  const stop=()=>{clearInterval(holdTimer);};
  el.addEventListener('touchstart',start,{passive:false});
  el.addEventListener('touchend',stop);el.addEventListener('touchcancel',stop);
  el.addEventListener('mousedown',start);window.addEventListener('mouseup',stop);
}
bindPad('pu',0,-1);bindPad('pd',0,1);bindPad('pl',-1,0);bindPad('pr',1,0);
document.getElementById('btnA').addEventListener('touchstart',e=>{e.preventDefault();pressA();},{passive:false});
document.getElementById('btnA').addEventListener('mousedown',()=>pressA());
document.getElementById('btnB').addEventListener('touchstart',e=>{e.preventDefault();pressB();},{passive:false});
document.getElementById('btnB').addEventListener('mousedown',()=>pressB());
document.getElementById('title-screen').addEventListener('click',()=>{if(G.mode==='title')titleConfirm();});
document.getElementById('bgm-btn').addEventListener('click',(e)=>{
  e.stopPropagation();AU.init();
  BGM.enabled=!BGM.enabled;
  document.getElementById('bgm-btn').textContent=BGM.enabled?'🎵':'🔇';
});
msgWin.addEventListener('click',()=>advanceMsg());

// ---------------- 開始 ----------------
renderTitle();
render();
</script>
</body>
</html>
